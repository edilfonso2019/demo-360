<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plano 360 Interactivo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
}

/* IFRAME */
.container{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
}
iframe{
  width:100%;
  height:100%;
  border:none;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:16px;
  z-index:9999;
}

/* ===== WIDGET ===== */
.chat-widget{
  position:fixed;
  bottom:20px;
  right:20px;
  z-index:9999;
  font-family:Arial, sans-serif;
}

/* BOTÓN CON TEXTO */
.chat-trigger{
  display:flex;
  align-items:center;
  background:#25D366;
  color:white;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
  transition:0.3s ease;
  gap:10px;
}

.chat-trigger:hover{
  transform:scale(1.05);
}

.chat-trigger span{
  font-weight:bold;
  font-size:14px;
}

/* BURBUJA LOGO */
.chat-icon{
  width:40px;
  height:40px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Ventana */
.chat-box{
  width:340px;
  background:white;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
  display:none;
  flex-direction:column;
  margin-bottom:15px;
  overflow:hidden;
  animation:fadeIn 0.3s ease;
}

.chat-header{
  background:#25D366;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chat-user{
  display:flex;
  align-items:center;
  gap:10px;
}

.chat-avatar{
  width:45px;
  height:45px;
  background:url('logo_ecorio.png') center/cover;
  border-radius:50%;
}

.status{
  font-size:12px;
  opacity:0.9;
}

.chat-body{
  padding:15px;
  background:#f5f5f5;
  font-size:14px;
}

.chat-message{
  background:white;
  padding:12px;
  border-radius:10px;
}

.chat-footer{
  display:flex;
  border-top:1px solid #ddd;
}

.chat-footer input{
  flex:1;
  border:none;
  padding:12px;
  outline:none;
}

.chat-footer button{
  background:#25D366;
  border:none;
  color:white;
  padding:0 18px;
  cursor:pointer;
  font-size:16px;
}

.close-btn{
  cursor:pointer;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:480px){
  .chat-box{
    width:95vw;
  }
}
</style>
</head>

<body>

<!-- Loader -->
<div id="loader">
  Cargando recorrido 360...
</div>

<!-- Iframe -->
<div class="container">
  <iframe 
    src="https://storage.net-fs.com/hosting/8461514/5/"
    allow="fullscreen; accelerometer; gyroscope; magnetometer"
    allowfullscreen>
  </iframe>
</div>

<!-- Widget WhatsApp -->
<div class="chat-widget">

  <!-- Ventana -->
  <div class="chat-box" id="chatBox">
    <div class="chat-header">
      <div class="chat-user">
        <div class="chat-avatar"></div>
        <div>
          <strong>Asesor Plano 360</strong><br>
          <small class="status">● En línea</small>
        </div>
      </div>
      <span class="close-btn" onclick="toggleChat()">✕</span>
    </div>

    <div class="chat-body">
      <div class="chat-message">
        👋 Hola, somos especialistas en <strong>Planos 360 Interactivos</strong> para proyectos inmobiliarios.<br><br>
        ¿Te gustaría implementar uno en tu proyecto?
      </div>
    </div>

    <div class="chat-footer">
      <input type="text" id="chatInput" placeholder="Quiero mi plano 360 para mi proyecto...">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- Botón con texto -->
  <div class="chat-trigger" onclick="toggleChat()">
    <div class="chat-icon">
      <svg viewBox="0 0 32 32" width="22" height="22">
        <path fill="white"
          d="M16 .396C7.163.396 0 7.559 0 16.396c0 2.89.757 5.61 2.08 7.98L.1 32l7.82-2.052A15.94 15.94 0 0016 32c8.837 0 16-7.163 16-16S24.837.396 16 .396z"/>
      </svg>
    </div>
    <span>Quiero mi plano 360</span>
  </div>

</div>

<script>
const phone="51925076753";

function toggleChat(){
  const box=document.getElementById("chatBox");
  box.style.display=box.style.display==="flex"?"none":"flex";
}

function sendMessage(){
  const input=document.getElementById("chatInput");
  const message=input.value||"Hola, quiero información sobre el Plano 360 Interactivo para mi proyecto.";
  const url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url,"_blank");
}

const iframe=document.querySelector("iframe");
iframe.onload=()=>{
  document.getElementById("loader").style.display="none";
};
</script>

</body>
</html>
