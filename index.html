<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plano 360 Interactivo</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

/* Contenedor iframe */
.container {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Loader */
#loader {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 16px;
  z-index: 9999;
}

/* ================= CHAT WIDGET ================= */

.chat-widget {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-family: Arial, sans-serif;
  z-index: 10000;
}

.chat-button {
  width: 60px;
  height: 60px;
  background: #25D366;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.chat-button:hover {
  transform: scale(1.08);
}

.chat-box {
  width: 340px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  display: none;
  flex-direction: column;
  margin-bottom: 15px;
  overflow: hidden;
  animation: fadeIn 0.3s ease;
}

.chat-header {
  background: #25D366;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.chat-user {
  display: flex;
  align-items: center;
  gap: 10px;
}

.chat-avatar {
  width: 45px;
  height: 45px;
  background: url('https://i.imgur.com/3GvwNBf.png') center/cover;
  border-radius: 50%;
}

.status {
  font-size: 12px;
  opacity: 0.9;
}

.chat-body {
  padding: 15px;
  background: #f5f5f5;
  font-size: 14px;
}

.chat-message {
  background: white;
  padding: 12px;
  border-radius: 10px;
}

.chat-footer {
  display: flex;
  border-top: 1px solid #ddd;
}

.chat-footer input {
  flex: 1;
  border: none;
  padding: 12px;
  outline: none;
}

.chat-footer button {
  background: #25D366;
  border: none;
  color: white;
  padding: 0 18px;
  cursor: pointer;
  font-size: 16px;
}

.close-btn {
  cursor: pointer;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- Loader -->
<div id="loader">
  Cargando recorrido 360...
</div>

<!-- Iframe -->
<div class="container">
  <iframe 
    src="https://storage.net-fs.com/hosting/8461514/5/"
    allow="fullscreen; accelerometer; gyroscope; magnetometer"
    allowfullscreen>
  </iframe>
</div>

<!-- CHAT WIDGET -->
<div class="chat-widget">

  <div class="chat-box" id="chatBox">
    <div class="chat-header">
      <div class="chat-user">
        <div class="chat-avatar"></div>
        <div>
          <strong>Asesor Plano 360</strong><br>
          <small class="status">● En línea</small>
        </div>
      </div>
      <span class="close-btn" onclick="toggleChat()">✕</span>
    </div>

    <div class="chat-body">
      <div class="chat-message">
        👋 Somos especialistas en <strong>Planos 360 Interactivos</strong> para proyectos inmobiliarios.<br><br>
        ¿Te gustaría implementar uno en tu proyecto?
      </div>
    </div>

    <div class="chat-footer">
      <input type="text" id="chatInput" placeholder="Quiero mi plano 360 para mi proyecto...">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <div class="chat-button" onclick="toggleChat()">
    💬
  </div>

</div>

<script>
const phone = "51925076753";

function toggleChat() {
  const box = document.getElementById("chatBox");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function sendMessage() {
  const input = document.getElementById("chatInput");
  const message = input.value || "Hola, quiero información sobre el Plano 360 Interactivo para mi proyecto.";
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}

const iframe = document.querySelector("iframe");
iframe.onload = () => {
  document.getElementById("loader").style.display = "none";
};

/* Auto abrir después de 4 segundos */
setTimeout(() => {
  document.getElementById("chatBox").style.display = "flex";
}, 4000);
</script>

</body>
</html>
