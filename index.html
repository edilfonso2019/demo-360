<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano 360 Profesional</title>

<style>
    body{
        margin:0;
        font-family: Arial, Helvetica, sans-serif;
        background:#f4f4f4;
    }

    header{
        background:#111;
        padding:15px;
        text-align:center;
    }

    header img{
        height:60px;
    }

    .hero{
        padding:60px 20px;
        text-align:center;
        background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        color:white;
    }

    .hero h1{
        font-size:40px;
        margin-bottom:20px;
    }

    .hero p{
        font-size:18px;
        max-width:600px;
        margin:auto;
        opacity:0.9;
    }

    /* BOTÓN WHATSAPP */
    .whatsapp-container{
        position:fixed;
        bottom:25px;
        right:25px;
        display:flex;
        align-items:center;
        z-index:999;
    }

    .whatsapp-text{
        background:white;
        color:#111;
        padding:10px 15px;
        border-radius:30px;
        margin-right:10px;
        font-size:14px;
        font-weight:bold;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
        white-space:nowrap;
    }

    .whatsapp-button{
        width:60px;
        height:60px;
        border-radius:50%;
        background:#25D366;
        display:flex;
        justify-content:center;
        align-items:center;
        box-shadow:0 5px 15px rgba(0,0,0,0.3);
        transition:0.3s;
        text-decoration:none;
    }

    .whatsapp-button:hover{
        transform:scale(1.1);
    }

    .whatsapp-button img{
        width:30px;
    }

</style>
</head>

<body>

<header>
    <img src="logo_ecorio.png" alt="Logo Asesor">
</header>

<section class="hero">
    <h1>Impulsa tus Ventas con Plano 360°</h1>
    <p>
        Presenta tus terrenos de forma profesional con recorridos interactivos en 360°.
        Facilita la decisión de compra y destaca frente a la competencia.
        Tecnología inmobiliaria que vende.
    </p>
</section>

<!-- BOTÓN WHATSAPP -->
<div class="whatsapp-container">
    <div class="whatsapp-text">Quiero mi Plano 360°</div>
    <a class="whatsapp-button" 
       href="https://wa.me/51925076753?text=Hola,%20quiero%20información%20sobre%20mi%20Plano%20360°"
       target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>
</div>

</body>
</html>
