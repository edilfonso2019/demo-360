<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plano 360 Interactivo</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

/* Contenedor iframe */
.container {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Loader */
#loader {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 16px;
  z-index: 9999;
}

/* Botón WhatsApp */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 14px 22px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  z-index: 9999;
  transition: all 0.3s ease;
  animation: pulse 2s infinite;
}

.whatsapp-float:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 25px rgba(0,0,0,0.4);
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<!-- Loader -->
<div id="loader">
  Cargando recorrido 360...
</div>

<!-- Iframe -->
<div class="container">
  <iframe 
    src="https://storage.net-fs.com/hosting/8461514/5/"
    allow="fullscreen; accelerometer; gyroscope; magnetometer"
    allowfullscreen>
  </iframe>
</div>

<!-- Botón WhatsApp -->
<a href="https://wa.me/51925076753?text=Hola,%20quiero%20mi%20plano%20360%20interactivo."
   class="whatsapp-float"
   target="_blank">
   💬 ¡Quiero mi plano 360!
</a>

<script>
const iframe = document.querySelector("iframe");
iframe.onload = () => {
  document.getElementById("loader").style.display = "none";
};
</script>

</body>
</html>
