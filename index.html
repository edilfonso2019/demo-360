<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Recorrido 360</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  .container {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>

<body>

<div class="container">
  <iframe 
    src="https://storage.net-fs.com/hosting/8461514/5/"
    allow="fullscreen; accelerometer; gyroscope; magnetometer"
    allowfullscreen>
  </iframe>
</div>

</body>
