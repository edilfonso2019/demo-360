<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plano 360 Interactivo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
}

/* IFRAME */
.container{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
}
iframe{
  width:100%;
  height:100%;
  border:none;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:16px;
  z-index:9999;
}

/* ===== WIDGET ===== */
.chat-widget{
  position:fixed;
  bottom:20px;
  right:20px;
  z-index:9999;
}

/* Botón burbuja */
.chat-button{
  width:60px;
  height:60px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
  transition:all 0.3s ease;
}

.chat-button:hover{
  transform:scale(1.08);
}

/* Ventana */
.chat-box{
  width:340px;
  background:white;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
  display:none;
  flex-direction:column;
  margin-bottom:15px;
  overflow:hidden;
  animation:fadeIn 0.3s ease;
}

.chat-header{
  background:#25D366;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chat-user{
  display:flex;
  align-items:center;
  gap:10px;
}

.chat-avatar{
  width:45px;
  height:45px;
  background:url('https://i.imgur.com/3GvwNBf.png') center/cover;
  border-radius:50%;
}

.status{
  font-size:12px;
  opacity:0.9;
}

.chat-body{
  padding:15px;
  background:#f5f5f5;
  font-size:14px;
}

.chat-message{
  background:white;
  padding:12px;
  border-radius:10px;
}

.chat-footer{
  display:flex;
  border-top:1px solid #ddd;
}

.chat-footer input{
  flex:1;
  border:none;
  padding:12px;
  outline:none;
}

.chat-footer button{
  background:#25D366;
  border:none;
  color:white;
  padding:0 18px;
  cursor:pointer;
  font-size:16px;
}

.close-btn{
  cursor:pointer;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- Loader -->
<div id="loader">
  Cargando recorrido 360...
</div>

<!-- Iframe -->
<div class="container">
  <iframe 
    src="https://storage.net-fs.com/hosting/8461514/5/"
    allow="fullscreen; accelerometer; gyroscope; magnetometer"
    allowfullscreen>
  </iframe>
</div>

<!-- Widget WhatsApp -->
<div class="chat-widget">

  <!-- Ventana -->
  <div class="chat-box" id="chatBox">
    <div class="chat-header">
      <div class="chat-user">
        <div class="chat-avatar"></div>
        <div>
          <strong>Asesor Plano 360</strong><br>
          <small class="status">● En línea</small>
        </div>
      </div>
      <span class="close-btn" onclick="toggleChat()">✕</span>
    </div>

    <div class="chat-body">
      <div class="chat-message">
        👋 Hola, somos especialistas en <strong>Planos 360 Interactivos</strong> para proyectos inmobiliarios.<br><br>
        ¿Te gustaría implementar uno en tu proyecto?
      </div>
    </div>

    <div class="chat-footer">
      <input type="text" id="chatInput" placeholder="Quiero mi plano 360 para mi proyecto...">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- Botón flotante SOLO LOGO -->
  <div class="chat-button" onclick="toggleChat()">
    <svg viewBox="0 0 32 32" width="28" height="28">
      <path fill="white"
        d="M16 .396C7.163.396 0 7.559 0 16.396c0 2.89.757 5.61 2.08 7.98L.1 32l7.82-2.052A15.94 15.94 0 0016 32c8.837 0 16-7.163 16-16S24.837.396 16 .396zm0 29.2c-2.57 0-5.08-.67-7.28-1.94l-.52-.31-4.64 1.22 1.24-4.52-.34-.54A13.57 13.57 0 012.4 16.396c0-7.49 6.11-13.6 13.6-13.6s13.6 6.11 13.6 13.6-6.11 13.6-13.6 13.6zm7.42-10.17c-.41-.2-2.42-1.19-2.8-1.33-.38-.14-.66-.2-.94.2-.28.41-1.08 1.33-1.32 1.6-.24.27-.49.3-.9.1-.41-.2-1.74-.64-3.32-2.05-1.23-1.1-2.06-2.46-2.3-2.87-.24-.41-.03-.63.18-.83.19-.19.41-.49.61-.73.2-.24.27-.41.41-.68.14-.27.07-.51-.03-.73-.1-.2-.94-2.26-1.29-3.1-.34-.82-.69-.71-.94-.72l-.8-.01c-.27 0-.73.1-1.11.51-.38.41-1.46 1.43-1.46 3.49 0 2.05 1.5 4.03 1.71 4.31.2.27 2.96 4.52 7.18 6.33 1 .43 1.78.69 2.39.88 1 .32 1.91.27 2.63.16.8-.12 2.42-.99 2.76-1.95.34-.95.34-1.77.24-1.95-.1-.18-.38-.29-.8-.49z"/>
    </svg>
  </div>

</div>

<script>
const phone="51925076753";

function toggleChat(){
  const box=document.getElementById("chatBox");
  box.style.display=box.style.display==="flex"?"none":"flex";
}

function sendMessage(){
  const input=document.getElementById("chatInput");
  const message=input.value||"Hola, quiero información sobre el Plano 360 Interactivo para mi proyecto.";
  const url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url,"_blank");
}

const iframe=document.querySelector("iframe");
iframe.onload=()=>{
  document.getElementById("loader").style.display="none";
};
</script>

</body>
</html>
